<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commission Tracker</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: "Segoe UI", sans-serif;
    color: #f1f1f1;
    background: #0f172a;
}

/* 🌌 FUNDO MAIS CONTROLADO */
body::before {
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 30%, #ff9de230, transparent 40%),
        radial-gradient(circle at 80% 60%, #c79dff30, transparent 40%);
    z-index:-1;
}

/* HERO */
.hero {
    margin-top:100px;
    text-align:center;
}

.hero h1 {
    font-size:42px;
    background: linear-gradient(90deg,#ff9de2,#ffe29d,#c79dff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero p {
    opacity:0.7;
    margin-top:8px;
}

/* INPUT */
.search-box { margin-top:30px; }

input {
    padding:12px;
    width:240px;
    border-radius:12px;
    border:none;
    background:#1e293b;
    color:white;
}

button {
    padding:12px 18px;
    border-radius:12px;
    border:none;
    margin-left:8px;
    cursor:pointer;
    background: linear-gradient(90deg,#ff9de2,#c79dff);
}

button:hover { transform:scale(1.05); }

/* CARD */
.card {
    margin:40px auto;
    padding:25px;
    width:320px;
    border-radius:18px;
    background:#1e293b;
    box-shadow:0 0 25px rgba(0,0,0,0.5);
}

.label { font-size:13px; opacity:0.6; }
.value { font-size:20px; margin-bottom:10px; }

/* STATUS */
.status {
    padding:10px;
    border-radius:10px;
    background:#0f172a;
    margin-bottom:10px;
}

/* 🔥 PROGRESS */
.progress-container {
    margin-top:15px;
    height:34px;
    background:#0f172a;
    border-radius:30px;
    position:relative;
    overflow:hidden;
    cursor:pointer;
}

.progress-bar {
    height:100%;
    width:0%;
    border-radius:30px;
    background: linear-gradient(270deg,#ff9de2,#ffe29d,#c79dff);
    background-size:400% 400%;
    animation:move 6s infinite;
    transition:width 1s;
}

@keyframes move {
    0% {background-position:0%}
    50% {background-position:100%}
    100% {background-position:0%}
}

/* 💖 MENSAGEM FUNCIONAL */
.floating-message {
    position:absolute;
    left:50%;
    bottom:50px;
    transform:translateX(-50%);
    background:#111827;
    padding:8px 14px;
    border-radius:10px;
    font-size:12px;
    opacity:0;
    transition:0.3s;
    white-space:nowrap;
    pointer-events:none;
}

.floating-message.show {
    opacity:1;
    transform:translateX(-50%) translateY(-5px);
}

/* LOADING */
.loader {
    margin-top:20px;
    opacity:0.6;
}

</style>
</head>

<body>

<div class="hero">
    <h1>Commission Tracker</h1>
    <p>Track your artwork progress</p>

    <div class="search-box">
        <input id="search" placeholder="Enter your name">
        <button onclick="searchClient()">Search</button>
    </div>

    <div id="result"></div>
</div>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/1ofYE3lurLEXTQ6XJeAgLwLzgRIFFD94M2Vh5iON-T-M/gviz/tq?tqx=out:json";
let clients = [];

async function fetchClients(){
    const res = await fetch(sheetURL);
    const text = await res.text();
    const json = JSON.parse(text.substring(47).slice(0,-2));
    return json.table.rows.map(r => ({
        name:r.c[0]?.v || "",
        position:Number(r.c[1]?.v || 0),
        status:r.c[2]?.v || "",
        deadline:r.c[3]?.v || ""
    }));
}

function calc(days){
    days = parseInt(days);
    return Math.min(Math.max(((7-days)/7)*100,0),100);
}

function msg(days){
    if(days>=7) return "Just started ✨";
    if(days>=5) return "Early progress 🎨";
    if(days>=3) return "Halfway there 💫";
    if(days>=1) return "Almost done 💖";
    return "Finishing touches 🌟";
}

/* 🔥 CORREÇÃO REAL AQUI */
function attachMessage(container, text){
    let box = document.createElement("div");
    box.className = "floating-message";
    box.textContent = text;
    container.appendChild(box);

    function show(){
        box.classList.add("show");
    }

    function hide(){
        box.classList.remove("show");
    }

    container.addEventListener("mouseenter", show);
    container.addEventListener("mouseleave", hide);
    container.addEventListener("click", show);
}

async function searchClient(){
    const name = document.getElementById("search").value.toLowerCase();
    const result = document.getElementById("result");

    result.innerHTML = `<div class="loader">Loading...</div>`;

    if(!clients.length){
        clients = await fetchClients();
    }

    const c = clients.find(x => x.name.toLowerCase() === name);

    if(!c){
        result.innerHTML = `<p style="opacity:.6">Client not found</p>`;
        return;
    }

    const progress = calc(c.deadline);

    result.innerHTML = `
    <div class="card">
        <div class="label">Client</div>
        <div class="value">${c.name}</div>

        <div class="label">Position</div>
        <div class="value">#${c.position}</div>

        <div class="label">Status</div>
        <div class="status">${c.status}</div>

        <div class="label">Estimated time</div>
        <div class="value">${c.deadline}</div>

        <div class="progress-container" id="progressBox">
            <div class="progress-bar" style="width:${progress}%"></div>
        </div>
    </div>
    `;

    const box = document.getElementById("progressBox");
    attachMessage(box, msg(parseInt(c.deadline)));
}

</script>

</body>
</html>
