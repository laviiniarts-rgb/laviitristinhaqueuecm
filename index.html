<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commission Tracker</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family: "Inter", sans-serif;
    background:#0b0f1a;
    color:#e5e7eb;
    overflow-x:hidden;
}

/* 🌌 BACKGROUND SOFT */
.bg{
    position:fixed;
    inset:0;
    z-index:-1;
    background:
    radial-gradient(circle at 20% 30%, #ff9de220, transparent 40%),
    radial-gradient(circle at 80% 60%, #c79dff20, transparent 40%),
    radial-gradient(circle at 50% 80%, #ffe29d15, transparent 40%);
    animation:bgMove 18s ease infinite;
}

@keyframes bgMove{
    0%{transform:translate(0,0);}
    50%{transform:translate(-3%,-3%);}
    100%{transform:translate(0,0);}
}

/* ✨ ENTRADA SUAVE */
.fade-in{
    opacity:0;
    transform:translateY(20px);
    animation:fadeUp 1s ease forwards;
}

.delay1{animation-delay:.2s;}
.delay2{animation-delay:.4s;}
.delay3{animation-delay:.6s;}

@keyframes fadeUp{
    to{opacity:1;transform:translateY(0);}
}

/* HERO */
.hero{
    margin-top:120px;
    text-align:center;
}

.hero h1{
    font-size:44px;
    background:linear-gradient(90deg,#ff9de2,#ffe29d,#c79dff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero p{
    opacity:.6;
    margin-top:10px;
}

/* INPUT */
.search{
    margin-top:40px;
}

input{
    padding:14px;
    width:260px;
    border-radius:14px;
    border:none;
    background:#111827;
    color:white;
}

button{
    padding:14px 20px;
    border-radius:14px;
    border:none;
    margin-left:10px;
    cursor:pointer;
    background:linear-gradient(90deg,#ff9de2,#c79dff);
    transition:.25s;
}

button:hover{
    transform:scale(1.07);
}

/* CARD */
.card{
    margin:50px auto;
    padding:28px;
    width:340px;
    border-radius:20px;
    background:#111827;
    box-shadow:0 0 30px rgba(0,0,0,0.6);
    animation:fadeUp .8s ease;
}

.label{
    font-size:13px;
    opacity:.6;
}

.value{
    font-size:20px;
    margin-bottom:12px;
}

/* STATUS */
.status{
    padding:10px;
    border-radius:10px;
    background:#0b0f1a;
    margin-bottom:10px;
}

/* 🔥 PROGRESS BAR */
.progress-container{
    margin-top:18px;
    height:40px;
    background:#0b0f1a;
    border-radius:40px;
    position:relative;
    overflow:hidden;
    cursor:pointer;
}

/* brilho interno */
.progress-bar{
    height:100%;
    width:0%;
    border-radius:40px;
    background:linear-gradient(270deg,#ff9de2,#ffe29d,#c79dff);
    background-size:400% 400%;
    animation:gradientMove 6s ease infinite;
    transition:width 1.2s ease;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
    color:#111;
    font-weight:600;
}

/* glow suave */
.progress-bar::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);
    animation:shine 3s infinite;
}

@keyframes shine{
    0%{transform:translateX(-100%);}
    100%{transform:translateX(100%);}
}

@keyframes gradientMove{
    0%{background-position:0%}
    50%{background-position:100%}
    100%{background-position:0%}
}

/* 💖 TOOLTIP */
.tooltip{
    position:absolute;
    bottom:55px;
    left:50%;
    transform:translateX(-50%) translateY(10px);
    background:#111827;
    padding:10px 14px;
    border-radius:12px;
    font-size:12px;
    opacity:0;
    transition:.3s;
    white-space:nowrap;
}

.tooltip.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
}

/* LOADING */
.loader{
    margin-top:30px;
    opacity:.5;
    animation:pulse 1.2s infinite;
}

@keyframes pulse{
    0%{opacity:.3}
    50%{opacity:1}
    100%{opacity:.3}
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="hero">
    <h1 class="fade-in">Commission Tracker</h1>
    <p class="fade-in delay1">Follow your artwork in real time</p>

    <div class="search fade-in delay2">
        <input id="search" placeholder="Enter your name">
        <button onclick="searchClient()">Search</button>
    </div>

    <div id="result" class="fade-in delay3"></div>
</div>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/1ofYE3lurLEXTQ6XJeAgLwLzgRIFFD94M2Vh5iON-T-M/gviz/tq?tqx=out:json";
let clients=[];

async function fetchClients(){
    const r=await fetch(sheetURL);
    const t=await r.text();
    const j=JSON.parse(t.substring(47).slice(0,-2));
    return j.table.rows.map(x=>({
        name:x.c[0]?.v||"",
        position:Number(x.c[1]?.v||0),
        status:x.c[2]?.v||"",
        deadline:x.c[3]?.v||""
    }));
}

function progress(days){
    days=parseInt(days);
    return Math.min(Math.max(((7-days)/7)*100,0),100);
}

function message(days){
    if(days>=7)return "Just started ✨";
    if(days>=5)return "Early progress 🎨";
    if(days>=3)return "Halfway 💫";
    if(days>=1)return "Almost done 💖";
    return "Finishing 🌟";
}

function attachTooltip(box,text){
    const tip=document.createElement("div");
    tip.className="tooltip";
    tip.textContent=text;
    box.appendChild(tip);

    box.addEventListener("mouseenter",()=>tip.classList.add("show"));
    box.addEventListener("mouseleave",()=>tip.classList.remove("show"));
    box.addEventListener("click",()=>tip.classList.toggle("show"));
}

async function searchClient(){
    const name=document.getElementById("search").value.toLowerCase();
    const result=document.getElementById("result");

    result.innerHTML=`<div class="loader">Loading...</div>`;

    if(!clients.length){
        clients=await fetchClients();
    }

    const c=clients.find(x=>x.name.toLowerCase()===name);

    if(!c){
        result.innerHTML=`<p style="opacity:.6">Client not found</p>`;
        return;
    }

    const prog=progress(c.deadline);
    const days=parseInt(c.deadline);

    result.innerHTML=`
    <div class="card">
        <div class="label">Client</div>
        <div class="value">${c.name}</div>

        <div class="label">Position</div>
        <div class="value">#${c.position}</div>

        <div class="label">Status</div>
        <div class="status">${c.status}</div>

        <div class="label">Estimated time</div>
        <div class="value">${c.deadline}</div>

        <div class="progress-container" id="barBox">
            <div class="progress-bar" style="width:${prog}%">
                ${Math.floor(prog)}%
            </div>
        </div>
    </div>
    `;

    const box=document.getElementById("barBox");
    attachTooltip(box,message(days));
}

</script>

</body>
</html>
