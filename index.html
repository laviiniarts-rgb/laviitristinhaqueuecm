<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commission Queue</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    background: linear-gradient(-45deg, #1a1a2e, #16213e, #0f3460, #1a1a2e);
    background-size: 400% 400%;
    animation: gradientBG 20s ease infinite;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    margin-top: 80px;
}

input {
    padding: 12px;
    width: 250px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    margin-left: 10px;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

.card {
    margin: 30px auto;
    padding: 20px;
    width: 320px;
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    backdrop-filter: blur(12px);
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px);}
    to { opacity: 1; transform: translateY(0);}
}

.label {
    opacity: 0.7;
    font-size: 14px;
}

.value {
    font-size: 20px;
    margin-bottom: 10px;
}

.status {
    padding: 10px;
    border-radius: 10px;
    position: relative;
    overflow: hidden;
}

.queue { background: #555; }
.sketch { background: orange; }
.coloring { background: dodgerblue; }
.rendering { background: purple; }

/* ⭐ estrelas */
.star {
    position: absolute;
    font-size: 12px;
    animation: starAnim 1.2s ease forwards;
}

@keyframes starAnim {
    0% { opacity: 0; transform: translateY(0) scale(0.5); }
    30% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-20px) scale(1); }
}

/* 🔥 BARRA INSANA */
.progress-container {
    margin-top: 15px;
    width: 100%;
    height: 26px;
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
}

.progress-bar {
    height: 100%;
    width: 0%;
    border-radius: 20px;
    background: linear-gradient(270deg, #ff9de2, #ffe29d, #c79dff);
    background-size: 400% 400%;
    animation: gradientMove 6s ease infinite;
    transition: width 1s ease;
    box-shadow: 0 0 15px rgba(255, 182, 255, 0.6);
    position: relative;
}

/* partículas */
.particle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    opacity: 0.7;
    animation: float 3s linear infinite;
}

@keyframes float {
    from { transform: translateY(10px); opacity: 0; }
    50% { opacity: 1; }
    to { transform: translateY(-20px); opacity: 0; }
}

/* porcentagem */
.percent {
    position: absolute;
    width: 100%;
    top: 0;
    font-size: 12px;
    line-height: 26px;
    text-align: center;
    pointer-events: none;
}

/* tooltip */
.tooltip {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 12px;
    opacity: 0;
    transition: 0.3s;
    white-space: nowrap;
}

.progress-container:hover .tooltip {
    opacity: 1;
}

/* pulse quando quase pronto */
.pulse {
    animation: pulse 1.2s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 0 10px rgba(255,255,255,0.4); }
    50% { box-shadow: 0 0 25px rgba(255,255,255,0.8); }
    100% { box-shadow: 0 0 10px rgba(255,255,255,0.4); }
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.notfound {
    margin-top: 20px;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">
    <h1>Commission Queue</h1>
    <input type="text" id="search" placeholder="Enter your name">
    <button onclick="searchClient()">Search</button>
    <div id="result"></div>
</div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/1ofYE3lurLEXTQ6XJeAgLwLzgRIFFD94M2Vh5iON-T-M/gviz/tq?tqx=out:json";

async function fetchClients() {
    const res = await fetch(sheetURL);
    const text = await res.text();
    const json = JSON.parse(text.substring(47).slice(0, -2));
    return json.table.rows.map(r => ({
        name: r.c[0]?.v || "",
        position: Number(r.c[1]?.v || 0),
        status: r.c[2]?.v || "",
        deadline: r.c[3]?.v || ""
    }));
}

function calculateProgress(deadline) {
    const days = parseInt(deadline);
    if (isNaN(days)) return 0;
    return Math.min(Math.max(((7 - days) / 7) * 100, 0), 100);
}

function getMessage(days) {
    if (days >= 7) return "Just started ✨";
    if (days >= 5) return "Early progress 🎨";
    if (days >= 3) return "Halfway there 💫";
    if (days >= 1) return "Almost done 💖";
    return "Finishing touches 🌟";
}

function createParticles(container) {
    for (let i = 0; i < 6; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        p.style.left = Math.random()*100 + "%";
        p.style.animationDelay = Math.random()*2 + "s";
        container.appendChild(p);
    }
}

let clients = [];

async function searchClient() {
    const input = document.getElementById("search").value.toLowerCase();
    const result = document.getElementById("result");

    if (!clients.length) clients = await fetchClients();

    result.innerHTML = "";
    const client = clients.find(c => c.name.toLowerCase() === input);

    if (!client && input !== "") {
        result.innerHTML = `<p class="notfound">Client not found</p>`;
        return;
    }

    if (client) {
        const progress = calculateProgress(client.deadline);
        const days = parseInt(client.deadline);

        result.innerHTML = `
        <div class="card">
            <div class="label">Client</div>
            <div class="value">${client.name}</div>

            <div class="label">Position</div>
            <div class="value">#${client.position}</div>

            <div class="label">Status</div>
            <div class="status">${client.status}</div>

            <div class="label">Estimated time</div>
            <div class="value">${client.deadline}</div>

            <div class="progress-container" onclick="alert('${getMessage(days)}')">
                <div class="progress-bar ${progress > 80 ? 'pulse' : ''}" style="width:${progress}%" id="bar"></div>
                <div class="percent">${Math.floor(progress)}%</div>
                <div class="tooltip">${getMessage(days)}</div>
            </div>
        </div>
        `;

        const bar = document.getElementById("bar");
        createParticles(bar);
    }
}
</script>

</body>
</html>
